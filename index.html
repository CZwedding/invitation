<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invitation</title>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        background: #070000;
      }

      body {
        font-family: "Noto Serif TC", serif;
      }

      .invitation {
        width: 100%;
        max-width: 768px;
        margin: 0 auto;
        background: #070000;
      }

      .invitation img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
        padding: 0;
        border: 0;
      }

      .rsvp-link {
        display: block;
        position: relative;
      }
      .hero {
        position: relative;
      }

      .hero .scroll-arrow {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 20px;
        width: 18px; /* 改這個值來調整大小 */
        height: auto;
        display: block;
        pointer-events: none;
        opacity: 1;
        filter: drop-shadow(0 0 6px rgba(255, 230, 230, 0.9));
        animation: arrow-bob 0.9s ease-in-out infinite;
      }

      @keyframes arrow-bob {
        0% {
          transform: translateX(-50%) translateY(0);
          opacity: 1;
        }
        50% {
          transform: translateX(-50%) translateY(6px);
          opacity: 0.9;
        }
        100% {
          transform: translateX(-50%) translateY(0);
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .scroll-arrow {
          animation: none;
        }
      }
      /* Map modal styles */
      .clickable {
        cursor: pointer;
      }
      .map-modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
      }
      .map-modal.open {
        display: block;
      }
      .map-modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
      }
      .map-modal-content {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(92vw, 900px);
        height: min(80vh, 600px);
        background: transparent;
        display: flex;
        align-items: stretch;
        justify-content: center;
        outline: none;
      }
      .map-wrapper {
        width: 100%;
        height: 100%;
        border-radius: 12px;
        overflow: hidden;
      }
      .map-wrapper iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .map-close {
        position: absolute;
        right: calc(50% - (min(92vw, 900px) / 2) + 12px);
        top: calc(50% - (min(80vh, 600px) / 2) + 12px);
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        border: none;
        padding: 6px 8px;
        border-radius: 6px;
        cursor: pointer;
        z-index: 10001;
      }
    </style>
  </head>

  <body>
    <main class="invitation">
      <div class="hero">
        <img src="image/invatation_1.png" alt="Wedding Invitation Cover" />
        <img
          class="scroll-arrow"
          src="image/invatation-08.png"
          alt="向下箭頭"
        />
      </div>

      <img src="image/invatation_2.png" alt="Wedding Invitation Main" />

      <img src="image/invatation_3.png" alt="Dress Code" />

      <img src="image/invatation_4.png" alt="Schedule" />

      <img
        id="venue-img"
        class="clickable"
        src="image/invatation_5.png"
        alt="Venue"
      />

      <a class="rsvp-link" href="rsvp/index.html">
        <img src="image/invatation_6.png" alt="填寫出席回函" />
      </a>
      <!-- Map modal -->
      <div id="map-modal" class="map-modal" aria-hidden="true">
        <div class="map-modal-backdrop" data-close></div>
        <div
          class="map-modal-content"
          role="dialog"
          aria-modal="true"
          aria-label="地圖預覽"
        >
          <button class="map-close" aria-label="關閉地圖">✕</button>
          <div class="map-wrapper" id="map-wrapper">
            <!-- iframe 會在開啟時建立以節省資源 -->
          </div>
        </div>
      </div>
    </main>
    <script>
      (function () {
        const venue = document.getElementById("venue-img");
        const modal = document.getElementById("map-modal");
        const wrapper = document.getElementById("map-wrapper");
        const closeBtn = modal ? modal.querySelector(".map-close") : null;
        const backdrop = modal ? modal.querySelector("[data-close]") : null;
        const embedSrc =
          "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d29122.581635626124!2d120.67236692875763!3d24.160412817113123!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x346917c15c7763e9%3A0xa1cc7f52b77c3f88!2z5paw5aSp5Zyw5bSH5b635peX6Imm5bqX!5e0!3m2!1szh-TW!2stw!4v1782063568869!5m2!1szh-TW!2stw";
        const mapsLink = "https://maps.app.goo.gl/KCoXPZVDFskyLLw3A";

        function openModal() {
          if (!modal) return;
          if (!wrapper.querySelector("iframe")) {
            const ifr = document.createElement("iframe");
            ifr.src = embedSrc;
            ifr.loading = "lazy";
            ifr.setAttribute("referrerpolicy", "no-referrer-when-downgrade");
            wrapper.appendChild(ifr);
          }
          modal.classList.add("open");
          modal.setAttribute("aria-hidden", "false");
          document.body.style.overflow = "hidden";
        }

        function closeModal() {
          if (!modal) return;
          modal.classList.remove("open");
          modal.setAttribute("aria-hidden", "true");
          document.body.style.overflow = "";
        }

        function openInNewTabWithEmbed() {
          // Create a temporary link with target=_blank to reliably open a new tab without navigating current page
          try {
            const a = document.createElement("a");
            a.href = mapsLink;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.style.display = "none";
            document.body.appendChild(a);
            a.click();
            a.remove();
          } catch (e) {
            // fallback: navigate current tab
            window.location.href = mapsLink;
          }
        }

        if (venue) {
          // make focusable for keyboard
          if (!venue.hasAttribute("tabindex"))
            venue.setAttribute("tabindex", "0");
          console.log("venue element found, attaching click handler");
          venue.addEventListener("click", function (e) {
            e.preventDefault();
            console.log("venue clicked");
            openInNewTabWithEmbed();
          });
          venue.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              openInNewTabWithEmbed();
            }
          });
        }

        if (closeBtn) closeBtn.addEventListener("click", closeModal);
        if (backdrop) backdrop.addEventListener("click", closeModal);
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closeModal();
        });
      })();
    </script>
  </body>
</html>
