<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>出席回函 | 昶毓 & 姿穎</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Noto+Serif+TC:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      :root {
        --cinema-black: #070404;
        --deep-red: #4b0205;
        --wine-red: #7b0709;
        --soft-red: #9b1718;
        --ivory-card: #fff7ea;
        --ivory-light: #fffbf3;
        --field-bg: #f7ead8;
        --champagne: #c9a86a;
        --champagne-soft: #ecd8ad;
        --text-main: #251614;
        --text-muted: #8a6d5b;
        --line-soft: rgba(201, 168, 106, 0.34);
      }

      body {
        font-family: "Noto Serif TC", serif;
        background:
          radial-gradient(
            circle at 50% -10%,
            rgba(255, 210, 150, 0.18),
            transparent 34%
          ),
          radial-gradient(
            circle at 50% 18%,
            rgba(155, 23, 24, 0.55),
            transparent 42%
          ),
          linear-gradient(180deg, #8a080a 0%, #5c0306 42%, #2a0103 100%);
        color: var(--text-main);
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.22;
        background:
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.24),
            transparent 22%,
            transparent 78%,
            rgba(0, 0, 0, 0.28)
          ),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 0px,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px,
            transparent 80px
          );
      }

      .serif-en {
        font-family: "Cormorant Garamond", serif;
      }

      .glass-nav {
        background: rgba(7, 4, 4, 0.82);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(201, 168, 106, 0.28);
      }

      input,
      select,
      textarea {
        border-radius: 8px !important;
        outline: none;
        transition: all 0.3s;
        color: var(--text-main);
      }

      input::placeholder,
      textarea::placeholder {
        color: rgba(138, 109, 91, 0.58);
      }

      input:focus,
      select:focus,
      textarea:focus {
        box-shadow:
          0 0 0 1px var(--champagne),
          0 8px 22px rgba(75, 2, 5, 0.08);
        background-color: var(--ivory-light);
      }

      .hidden-section {
        display: none;
      }

      .fade-in {
        animation: fadeIn 0.4s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <nav
      class="glass-nav fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center"
    >
      <div class="serif-en text-2xl font-medium tracking-widest text-[#ecd8ad]">
        C & Z
      </div>
      <div class="flex space-x-6 text-sm tracking-widest font-medium">
        <a
          id="navInvitationLink"
          data-href="../"
          aria-disabled="true"
          title="此連結暫時停用（僅限出席回函頁面）"
          tabindex="-1"
          class="text-[#fff7ea]/45 opacity-60 cursor-not-allowed"
        >
          電子喜帖
        </a>
        <a href="#" class="text-[#ecd8ad] border-b-2 border-[#c9a86a]">
          出席回函
        </a>
      </div>
    </nav>

    <div class="pt-32 px-6 pb-20 min-h-[90vh] relative z-10">
      <div
        class="max-w-xl mx-auto bg-[#fff7ea] p-8 md:p-12 rounded-3xl shadow-[0_30px_80px_rgba(0,0,0,0.38)] border border-[#c9a86a]/35 relative overflow-hidden"
      >
        <div class="absolute top-0 left-0 w-full h-2 bg-[#070404]"></div>
        <div
          class="absolute inset-0 pointer-events-none rounded-3xl border border-white/50"
        ></div>

        <div class="text-center mb-10 mt-2 relative z-10">
          <h3 class="text-2xl font-medium mb-2 tracking-widest text-[#251614]">
            出席回函
          </h3>
          <p
            class="serif-en text-sm text-[#7b0709] italic uppercase tracking-widest"
          >
            RSVP Survey
          </p>
        </div>

        <iframe
          name="hidden_iframe"
          id="hidden_iframe"
          style="display: none"
          onload="handleIframeLoad()"
        ></iframe>

        <form
          action="https://docs.google.com/forms/d/e/1FAIpQLSeXJvhL855NqkjFCsHgeZ5HAyDJXfBw3nwKEOLVuz1dj2XGoA/formResponse"
          method="post"
          target="hidden_iframe"
          id="weddingForm"
          onsubmit="return prepareSubmit();"
          class="relative z-10"
        >
          <input type="hidden" name="pageHistory" value="0" />

          <div id="formContent" class="space-y-8">
            <div>
              <label
                class="block text-xs font-bold mb-3 text-[#8a6d5b] uppercase tracking-widest"
              >
                姓名 NAME *
              </label>
              <input
                type="text"
                name="entry.162623246"
                required
                class="w-full px-5 py-4 bg-[#f7ead8] border-none shadow-sm"
                placeholder="請輸入姓名"
              />
            </div>

            <div>
              <label
                class="block text-xs font-bold mb-3 text-[#8a6d5b] uppercase tracking-widest"
              >
                與新人的關係 RELATION *
              </label>
              <select
                id="relSelect"
                name="entry.1835028889"
                required
                class="w-full px-5 py-4 bg-[#f7ead8] border-none shadow-sm"
              >
                <option value="" disabled selected>請選擇您的關係...</option>
                <option value="男方親友">男方親友</option>
                <option value="女方親友">女方親友</option>
              </select>
            </div>

            <div>
              <label
                class="block text-xs font-bold mb-3 text-[#8a6d5b] uppercase tracking-widest"
              >
                認識緣分 HOW WE MET *
              </label>
              <select
                name="entry.2109635832"
                required
                class="w-full px-5 py-4 bg-[#f7ead8] border-none shadow-sm"
              >
                <option value="" disabled selected>請選擇認識方式...</option>
                <option value="親戚">親戚</option>
                <option value="父母朋友">父母朋友</option>
                <option value="國中同學">國中同學</option>
                <option value="高中同學">高中同學</option>
                <option value="大學同學">大學同學</option>
                <option value="同事">同事</option>
                <option value="其他">其他</option>
              </select>
            </div>

            <div>
              <label
                class="block text-xs font-bold mb-3 text-[#8a6d5b] uppercase tracking-widest"
              >
                是否能來見證幸福 ATTENDANCE *
              </label>
              <select
                id="vAtt"
                name="entry.839371500"
                required
                onchange="handleLogic()"
                class="w-full px-5 py-4 bg-[#f7ead8] border-none shadow-sm"
              >
                <option value="" disabled selected>請選擇出席意願...</option>
                <option value="肚子準備好了！一定準時報到吃喜酒 🍽️">
                  肚子準備好了！一定準時報到吃喜酒 🍽️
                </option>
                <option value="嗚嗚，這天剛好不行，祝你們婚禮順利圓滿 😭">
                  嗚嗚，這天剛好不行，祝你們婚禮順利圓滿 😭
                </option>
              </select>
            </div>

            <div
              id="attendBox"
              class="hidden-section space-y-8 bg-[#fffbf3] p-6 rounded-2xl border border-[#c9a86a]/30 shadow-inner fade-in"
            >
              <div>
                <label class="block text-xs font-bold mb-2 text-[#7b0709]">
                  攜伴參加 COMPANIONS *
                </label>
                <select
                  id="vComp"
                  name="entry.1719850992"
                  onchange="handleLogic()"
                  class="w-full px-4 py-3 bg-[#fff7ea] border border-[#c9a86a]/30"
                >
                  <option value="" disabled selected>請選擇攜伴狀態...</option>
                  <option value="只有我一個人出席喔！🙌">
                    只有我一個人出席喔！🙌
                  </option>
                  <option value="我要攜伴！">我要攜伴！</option>
                </select>
              </div>

              <div id="compDetail" class="hidden-section space-y-4 fade-in">
                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <label
                      class="block text-[10px] font-bold mb-1 text-[#8a6d5b] uppercase"
                    >
                      大人人數
                    </label>
                    <input
                      id="adultCount"
                      type="number"
                      name="entry.957124862"
                      class="w-full px-4 py-2 bg-[#fff7ea] border border-[#c9a86a]/30"
                      placeholder="含自己"
                      min="1"
                    />
                  </div>

                  <div>
                    <label
                      class="block text-[10px] font-bold mb-1 text-[#8a6d5b] uppercase"
                    >
                      小孩人數
                    </label>
                    <input
                      type="number"
                      name="entry.1200218196"
                      class="w-full px-4 py-2 bg-[#fff7ea] border border-[#c9a86a]/30"
                      placeholder="0"
                      min="0"
                    />
                  </div>
                </div>

                <div>
                  <label
                    class="block text-[10px] font-bold mb-1 text-[#8a6d5b] uppercase"
                  >
                    兒童椅/嬰兒車備註
                  </label>
                  <input
                    type="text"
                    name="entry.1364757732"
                    class="w-full px-4 py-2 bg-[#fff7ea] border border-[#c9a86a]/30"
                    placeholder="例：需1張兒童椅"
                  />
                </div>
              </div>

              <div>
                <label class="block text-xs font-bold mb-2 text-[#7b0709]">
                  飲食需求 DIETARY *
                </label>
                <select
                  name="entry.66149520"
                  class="w-full px-4 py-3 bg-[#fff7ea] border border-[#c9a86a]/30"
                >
                  <option value="我要享用一般葷食">我要享用一般葷食</option>
                  <option value="我需要準備素食餐點">我需要準備素食餐點</option>
                </select>
              </div>
            </div>

            <div>
              <label
                class="block text-xs font-bold mb-3 text-[#8a6d5b] uppercase tracking-widest"
              >
                給我們的祝福 MESSAGE
              </label>
              <textarea
                name="entry.994223227"
                rows="3"
                class="w-full px-5 py-4 bg-[#f7ead8] border-none shadow-sm"
                placeholder="留下您的祝福..."
              ></textarea>
            </div>

            <button
              id="submitBtn"
              type="submit"
              class="w-full bg-[#070404] text-[#fff7ea] py-5 rounded-2xl font-bold tracking-[0.3em] hover:bg-[#251614] hover:shadow-xl transition-all shadow-md active:scale-95"
            >
              確認送出 SUBMIT
            </button>
          </div>

          <div id="successMsg" class="hidden-section text-center py-10">
            <span class="text-5xl block mb-6">✨</span>
            <h4 class="text-xl font-medium mb-4 text-[#251614] tracking-widest">
              回傳成功！
            </h4>
            <p class="text-[#8a6d5b] text-sm leading-relaxed mb-10">
              昶毓 & 姿穎 已收到您的祝福。<br />期待與您分享喜悅！
            </p>
          </div>
        </form>
      </div>
    </div>

    <script>
      let submitted = false;
      let submitFallbackTimer = null;

      function setSectionEnabled(sectionId, enabled) {
        const section = document.getElementById(sectionId);
        if (!section) return;

        const fields = section.querySelectorAll("input, select, textarea");
        fields.forEach((field) => {
          field.disabled = !enabled;
        });
      }

      function handleLogic() {
        const attEl = document.getElementById("vAtt");
        const compEl = document.getElementById("vComp");
        const att = attEl ? attEl.value : "";
        const comp = compEl ? compEl.value : "";

        const isAttend = att.includes("肚子準備好了");
        const isAbsent = att.includes("嗚嗚");
        const hasCompanion = comp === "我要攜伴！";

        const attendBoxEl = document.getElementById("attendBox");
        if (attendBoxEl) {
          attendBoxEl.style.display = isAttend ? "block" : "none";
        }

        const absentBoxEl = document.getElementById("absentBox");
        if (absentBoxEl) {
          absentBoxEl.style.display = isAbsent ? "block" : "none";
        }

        const compDetailEl = document.getElementById("compDetail");
        if (compDetailEl) {
          compDetailEl.style.display =
            isAttend && hasCompanion ? "block" : "none";
        }

        if (compEl) {
          compEl.disabled = !isAttend;
        }

        setSectionEnabled("attendBox", isAttend);
        setSectionEnabled("absentBox", isAbsent);

        if (compDetailEl) {
          const compDetailFields = compDetailEl.querySelectorAll(
            "input, select, textarea",
          );
          compDetailFields.forEach((field) => {
            field.disabled = !(isAttend && hasCompanion);
          });
        }

        const absentOption = document.getElementById("vAbsentOption");
        if (absentOption) {
          absentOption.required = isAbsent;
        }

        const adultCount = document.getElementById("adultCount");
        if (adultCount) {
          adultCount.required = isAttend && hasCompanion;
        }
      }

      function prepareSubmit() {
        handleLogic();

        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.textContent = "送出中...";
        submitBtn.classList.add("opacity-70", "cursor-not-allowed");

        submitted = true;

        clearTimeout(submitFallbackTimer);
        submitFallbackTimer = setTimeout(() => {
          if (submitted) {
            showSuccess();
          }
        }, 2500);

        return true;
      }

      function handleIframeLoad() {
        if (submitted) {
          clearTimeout(submitFallbackTimer);
          showSuccess();
        }
      }

      function showSuccess() {
        document.getElementById("formContent").style.display = "none";
        document.getElementById("successMsg").style.display = "block";

        const navLink = document.getElementById("navInvitationLink");
        if (navLink) {
          const href =
            navLink.dataset && navLink.dataset.href
              ? navLink.dataset.href
              : "../";
          navLink.setAttribute("href", href);
          navLink.removeAttribute("aria-disabled");
          navLink.removeAttribute("tabindex");
          navLink.classList.remove("opacity-60", "cursor-not-allowed");
          navLink.classList.add(
            "text-[#fff7ea]",
            "hover:text-[#c9a86a]",
            "transition",
          );
        }

        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      window.addEventListener("DOMContentLoaded", () => {
        setSectionEnabled("attendBox", false);
        setSectionEnabled("absentBox", false);
        handleLogic();
      });
    </script>
  </body>
</html>
